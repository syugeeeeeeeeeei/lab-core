name: lab-core

services:
  dnsmasq:
    image: andyshinn/dnsmasq:2.86
    container_name: lab-dnsmasq
    cap_add:
      - NET_ADMIN
    command:
      - --keep-in-foreground
      - --log-facility=-
      - --conf-file=/etc/dnsmasq.d/lab.conf
    ports:
      - "53:53/udp"
      - "53:53/tcp"
    volumes:
      - ./dnsmasq/lab.conf:/etc/dnsmasq.d/lab.conf:ro
    restart: unless-stopped

  npm:
    image: jc21/nginx-proxy-manager:2.12.3
    container_name: lab-npm
    ports:
      - "${NPM_HTTP_PORT:-80}:80"
      - "${NPM_HTTPS_PORT:-443}:443"
      - "${NPM_ADMIN_PORT:-81}:81"
    volumes:
      - ./data/npm:/data
      - ./data/letsencrypt:/etc/letsencrypt
    networks:
      - lab-bridge
    restart: unless-stopped

  manager:
    build:
      context: ./manager
    container_name: lab-wire-manager
    environment:
      NETWORK_NAME: ${LAB_BRIDGE_NAME:-lab-bridge}
      RECONNECT_DELAY_MS: ${MANAGER_RECONNECT_DELAY_MS:-3000}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-bridge
    restart: unless-stopped

  dockge:
    image: louislam/dockge:1
    container_name: lab-dockge
    ports:
      - "${DOCKGE_PORT:-5001}:5001"
    environment:
      DOCKGE_STACKS_DIR: ${DOCKGE_STACKS_DIR:-/opt/stacks}
      TZ: ${TZ:-Asia/Tokyo}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/dockge:/app/data
      - ./stacks:${DOCKGE_STACKS_DIR:-/opt/stacks}
    networks:
      - lab-bridge
    restart: unless-stopped

networks:
  lab-bridge:
    external: true
    name: ${LAB_BRIDGE_NAME:-lab-bridge}

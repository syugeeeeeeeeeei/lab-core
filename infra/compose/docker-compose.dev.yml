services:
  backend:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "apk add --no-cache git docker-cli && yarn install --frozen-lockfile --ignore-optional --non-interactive && yarn dev:backend"
    volumes:
      - ../../:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "7300:7300"

  dashboard:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "yarn install --frozen-lockfile --ignore-optional --non-interactive && yarn dev:dashboard"
    volumes:
      - ../../:/workspace
    environment:
      VITE_DEV_PROXY_TARGET: "http://backend:7300"
    depends_on:
      - backend
    ports:
      - "5173:5173"

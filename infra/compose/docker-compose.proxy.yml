name: labcore-dev-proxy

services:
  proxy:
    image: caddy:2-alpine
    ports:
      - "127.0.0.1:80:80/tcp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../proxy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ../../core/backend/data/generated:/data/generated:ro
